name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      target:
        description: Branch, tag, or commit SHA to tag and release from.
        required: false
        type: string
        default: main
      prerelease:
        description: Mark the GitHub Release as a prerelease.
        required: false
        type: boolean
        default: false
      draft:
        description: Create the GitHub Release as a draft.
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate-pip-project:
    name: Validate Pip Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: pip
      project_directory: fixtures/pip_project
      artifact_name: fixture-pip
      version_management: project

  validate-pip-optional-paths:
    name: Validate Pip Fixture Optional Paths
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: pip
      project_directory: fixtures/pip_project
      artifact_name: fixture-pip-optional
      version_management: none
      cache_enabled: false
      tests_enabled: false
      lint_enabled: false
      custom_build_command: python -m build

  validate-poetry-project:
    name: Validate Poetry Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: poetry
      project_directory: fixtures/poetry_project
      artifact_name: fixture-poetry
      version_management: project
      custom_test_command: poetry run pytest
      custom_lint_command: poetry run ruff check .
      custom_build_command: poetry build

  validate-uv-project:
    name: Validate UV Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12", "3.13"]'
      package_manager: uv
      project_directory: fixtures/uv_project
      artifact_name: fixture-uv
      version_management: timestamp
      custom_test_command: uv run pytest
      custom_lint_command: uv run ruff check .
      custom_build_command: uv build

  validate-build-failure-project:
    name: Validate Build Failure Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: pip
      project_directory: fixtures/build_failure_project
      artifact_name: fixture-build-failure
      allow_failure: true
      version_management: none
      cache_enabled: false
      tests_enabled: false
      lint_enabled: false
      custom_build_command: python fail_build.py

  validate-test-failure-project:
    name: Validate Test Failure Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: pip
      project_directory: fixtures/test_failure_project
      artifact_name: fixture-test-failure
      allow_failure: true
      version_management: project
      cache_enabled: false
      lint_enabled: false

  validate-dependency-failure-project:
    name: Validate Dependency Failure Fixture
    uses: ./.github/workflows/python-ci.yml
    with:
      python_versions: '["3.12"]'
      package_manager: pip
      project_directory: fixtures/dependency_failure_project
      artifact_name: fixture-dependency-failure
      allow_failure: true
      version_management: none
      cache_enabled: false
      tests_enabled: false
      lint_enabled: false

  resolve-config:
    name: Resolve Release Version
    runs-on: ubuntu-latest

    outputs:
      workflow_release_version: ${{ steps.resolve.outputs.workflow_release_version }}
      git_commit_short_hash: ${{ steps.resolve.outputs.git_commit_short_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 1

      - name: Resolve release version from config
        id: resolve
        shell: bash
        run: >
          bash ./scripts/github/resolve_workflow_defaults.sh
          ./workflow-config.json
          ""

  validate-build-reports:
    needs:
      - validate-pip-project
      - validate-pip-optional-paths
      - validate-poetry-project
      - validate-uv-project
      - validate-build-failure-project
      - validate-test-failure-project
      - validate-dependency-failure-project
    name: Validate Build Reports
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-report-py*"
          path: build-reports
          merge-multiple: true

      - name: Validate pip report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-pip-report-py3.12.json
          --package-manager pip
          --python-version 3.12
          --project-directory fixtures/pip_project
          --version-management project
          --tests-enabled true
          --lint-enabled true
          --cache-enabled true
          --build-command-contains "python -m build"
          --test-command-contains "python -m pytest"
          --lint-command-contains "ruff check ."

      - name: Validate pip optional report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-pip-optional-report-py3.12.json
          --package-manager pip
          --python-version 3.12
          --project-directory fixtures/pip_project
          --version-management none
          --tests-enabled false
          --lint-enabled false
          --cache-enabled false
          --build-command-contains "python -m build"

      - name: Validate poetry report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-poetry-report-py3.12.json
          --package-manager poetry
          --python-version 3.12
          --project-directory fixtures/poetry_project
          --version-management project
          --tests-enabled true
          --lint-enabled true
          --cache-enabled true
          --build-command-contains "poetry build"
          --test-command-contains "poetry run pytest"
          --lint-command-contains "poetry run ruff check ."

      - name: Validate uv report for 3.12
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-uv-report-py3.12.json
          --package-manager uv
          --python-version 3.12
          --project-directory fixtures/uv_project
          --version-management timestamp
          --tests-enabled true
          --lint-enabled true
          --cache-enabled true
          --build-command-contains "uv build"
          --test-command-contains "uv run pytest"
          --lint-command-contains "uv run ruff check ."

      - name: Validate uv report for 3.13
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-uv-report-py3.13.json
          --package-manager uv
          --python-version 3.13
          --project-directory fixtures/uv_project
          --version-management timestamp
          --tests-enabled true
          --lint-enabled true
          --cache-enabled true
          --build-command-contains "uv build"
          --test-command-contains "uv run pytest"
          --lint-command-contains "uv run ruff check ."

      - name: Validate build failure report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-build-failure-report-py3.12.json
          --package-manager pip
          --python-version 3.12
          --project-directory fixtures/build_failure_project
          --version-management none
          --tests-enabled false
          --lint-enabled false
          --cache-enabled false
          --build-command-contains "python fail_build.py"
          --expect-stage resolve=success
          --expect-stage cache=skipped
          --expect-stage setup=success
          --expect-stage build=failed
          --expect-stage test=unknown
          --expect-stage lint=unknown
          --expect-stage artifact=unknown
          --expect-stage tag=unknown
          --expect-stage publish=unknown

      - name: Validate test failure report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-test-failure-report-py3.12.json
          --package-manager pip
          --python-version 3.12
          --project-directory fixtures/test_failure_project
          --version-management project
          --tests-enabled true
          --lint-enabled false
          --cache-enabled false
          --build-command-contains "python -m build"
          --test-command-contains "python -m pytest"
          --expect-stage resolve=success
          --expect-stage cache=skipped
          --expect-stage setup=success
          --expect-stage build=success
          --expect-stage test=failed
          --expect-stage lint=unknown
          --expect-stage artifact=unknown
          --expect-stage tag=unknown
          --expect-stage publish=unknown

      - name: Validate dependency failure report
        shell: bash
        run: >
          python ./scripts/github/validate_build_report.py
          --report build-reports/fixture-dependency-failure-report-py3.12.json
          --package-manager pip
          --python-version 3.12
          --project-directory fixtures/dependency_failure_project
          --version-management none
          --tests-enabled false
          --lint-enabled false
          --cache-enabled false
          --build-command-contains "python -m build"
          --expect-stage resolve=success
          --expect-stage cache=skipped
          --expect-stage setup=failed
          --expect-stage build=unknown
          --expect-stage test=unknown
          --expect-stage lint=unknown
          --expect-stage artifact=unknown
          --expect-stage tag=unknown
          --expect-stage publish=unknown

  release:
    needs:
      - validate-pip-project
      - validate-pip-optional-paths
      - validate-poetry-project
      - validate-uv-project
      - validate-build-reports
      - resolve-config
    name: Tag and Release
    runs-on: ubuntu-latest

    env:
      RELEASE_VERSION: ${{ needs.resolve-config.outputs.workflow_release_version }}
      RELEASE_COMMIT_SHORT_HASH: ${{ needs.resolve-config.outputs.git_commit_short_hash }}
      RELEASE_TARGET: ${{ inputs.target }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
      RELEASE_DRAFT: ${{ inputs.draft }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Prepare release metadata and assets
        shell: bash
        run: bash ./scripts/github/prepare_workflow_release.sh

      - name: Create and push tag
        shell: bash
        run: bash ./scripts/github/create_and_push_tag.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ inputs.target }}
          name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_TAR }}

      - name: Create Commit GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_COMMIT_TAG }}
          target_commitish: ${{ inputs.target }}
          name: ${{ env.RELEASE_COMMIT_NAME }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_TAR }}

      - name: Write release summary
        if: ${{ always() }}
        shell: bash
        run: bash ./scripts/github/create_workflow_release_summary.sh
